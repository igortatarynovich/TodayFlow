[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    smoke: быстрый набор проверок API для CI (без тяжёлых сценариев)
addopts = 
    -v
    --strict-markers
    --tb=short
    --cov=todayflow_backend
    --cov-report=term-missing
    --cov-report=html
    --cov-report=xml

