services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: todayflow
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  astro:
    build:
      context: .
      dockerfile: astro/Dockerfile
      args:
        # 1 = --trusted-host для PyPI (сети с SSL inspection, см. backend/Dockerfile)
        PIP_TRUSTED_HOSTS: ${PIP_TRUSTED_HOSTS:-0}
    ports:
      - "8081:8081"

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        PIP_TRUSTED_HOSTS: ${PIP_TRUSTED_HOSTS:-0}
    # External APIs (OpenAI) need working DNS; Docker Desktop / some VPNs break default resolver.
    dns:
      - 8.8.8.8
      - 8.8.4.4
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/todayflow
      ASTRO_SERVICE_URL: http://astro:8081
      CONTENT_DIR: "/CONTENT"
      CONTENT_VERSION: "1.0.0"
      I18N_VERSION: "1.0.0"
      TODAYFLOW_LOCALE: ${TODAYFLOW_LOCALE:-ru}
      FRONTEND_APP_URL: ${PUBLIC_WEB_URL:-http://localhost:3000}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-["http://localhost:3000","http://127.0.0.1:3000","http://localhost:3001","http://127.0.0.1:3001"]}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      LLM_DEFAULT_MODEL: ${LLM_DEFAULT_MODEL:-gpt-5.5}
      GUIDANCE_LLM_MODEL: ${GUIDANCE_LLM_MODEL:-gpt-5.5}
      LLM_QUALITY_MODE: ${LLM_QUALITY_MODE:-rich}
      NEBIUS_API_KEY: ${NEBIUS_API_KEY:-}
      NEBIUS_BASE_URL: ${NEBIUS_BASE_URL:-https://api.tokenfactory.nebius.com/v1/}
      NEBIUS_MODEL: ${NEBIUS_MODEL:-deepseek-ai/DeepSeek-V4-Pro}
      # Guest+registered content v1.1 after human review; premium still not wide-enabled.
      COMPATIBILITY_CONTENT_V1: ${COMPATIBILITY_CONTENT_V1:-1}
    volumes:
      - ./CONTENT:/CONTENT
    depends_on:
      - postgres
      - astro
    ports:
      - "8080:8080"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        # Prefer PUBLIC_API_URL (prod/.env) so public sites never bake localhost.
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-${PUBLIC_API_URL:-http://localhost:8080}}
        NEXT_PUBLIC_APP_LOCALE: ${NEXT_PUBLIC_APP_LOCALE:-ru}
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-${PUBLIC_API_URL:-http://localhost:8080}}
      NEXT_PUBLIC_APP_LOCALE: ${NEXT_PUBLIC_APP_LOCALE:-ru}
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  pgdata: {}
