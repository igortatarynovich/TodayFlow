# Production stack — put nginx/Caddy in front of frontend:3000 and backend:8080.
# See README §Public deployment and `.env.production.example`.

services:
  postgres:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: todayflow
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d todayflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  astro:
    build:
      context: .
      dockerfile: astro/Dockerfile
    restart: unless-stopped
    dns:
      - 8.8.8.8
      - 8.8.4.4

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    dns:
      - 8.8.8.8
      - 8.8.4.4
    environment:
      ENVIRONMENT: production
      DATABASE_URL: postgresql+psycopg://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/todayflow
      ASTRO_SERVICE_URL: http://astro:8081
      CONTENT_DIR: "/CONTENT"
      CONTENT_VERSION: "1.0.0"
      I18N_VERSION: "1.0.0"
      AUTH_JWT_SECRET: ${AUTH_JWT_SECRET:?Set AUTH_JWT_SECRET in .env}
      FRONTEND_APP_URL: ${PUBLIC_WEB_URL:-http://localhost:3000}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      LLM_DEFAULT_MODEL: ${LLM_DEFAULT_MODEL:-}
      LLM_QUALITY_MODE: ${LLM_QUALITY_MODE:-rich}
      NEBIUS_API_KEY: ${NEBIUS_API_KEY:-}
      NEBIUS_BASE_URL: ${NEBIUS_BASE_URL:-https://api.tokenfactory.nebius.com/v1/}
      NEBIUS_MODEL: ${NEBIUS_MODEL:-deepseek-ai/DeepSeek-V4-Pro}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      EMAIL_FROM: ${EMAIL_FROM:-no-reply@todayflow.app}
      PAYMENTS_MODE: ${PAYMENTS_MODE:-mock}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      APPLE_CLIENT_ID: ${APPLE_CLIENT_ID:-}
    volumes:
      - ./CONTENT:/CONTENT
    depends_on:
      postgres:
        condition: service_healthy
      astro:
        condition: service_started
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${PUBLIC_API_URL:-http://localhost:8080}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:3000"

volumes:
  pgdata: {}
